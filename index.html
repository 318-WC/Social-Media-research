<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小紅書 - 春日生活指南</title>
    <style>
        :root {
            --xhs-red: #ff2442;
            --xhs-bg: #fff;
            --xhs-gray-bg: #f8f8f8;
            --xhs-text: #333;
            --xhs-gray-text: #666;
            --card-radius: 16px;
        }

        body { margin: 0; background-color: var(--xhs-bg); font-family: -apple-system, "PingFang SC", sans-serif; display: flex; overflow-x: hidden; }

        /* --- 導航欄自適應佈局 --- */
        .nav-container {
            width: 72px; height: 100vh; border-right: 1px solid #eee;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 20px; position: fixed; background: #fff; z-index: 100;
        }
        .logo-box { background: var(--xhs-red); width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; margin-bottom: 40px; font-size: 20px; }
        .nav-item { margin-bottom: 30px; cursor: pointer; text-align: center; color: var(--xhs-text); font-size: 13px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .nav-container {
                width: 100%; height: 60px; border-right: none; border-top: 1px solid #eee;
                flex-direction: row; padding-top: 0; bottom: 0; top: auto; justify-content: space-around;
                padding-bottom: env(safe-area-inset-bottom);
            }
            .logo-box { display: none; }
            .nav-item { margin-bottom: 0; flex: 1; padding: 10px 0; }
            .main-content { margin-left: 0 !important; padding: 0 10px !important; padding-bottom: 80px; }
            .header { width: 100%; max-width: none !important; }
        }

        /* --- 主內容區 --- */
        .main-content { margin-left: 72px; flex: 1; padding: 0 40px; min-width: 0; }
        .header { height: 80px; display: flex; align-items: center; position: sticky; top: 0; background: #fff; z-index: 50; }
        .search-input { background: var(--xhs-gray-bg); border: none; border-radius: 24px; padding: 12px 25px; width: 100%; max-width: 450px; font-size: 15px; outline: none; }

        /* --- 瀑布流自適應欄數 --- */
        .explore-container { column-count: 5; column-gap: 20px; margin-top: 10px; }
        @media (max-width: 1400px) { .explore-container { column-count: 4; } }
        @media (max-width: 1100px) { .explore-container { column-count: 3; } }
        @media (max-width: 768px) { .explore-container { column-count: 2; column-gap: 10px; } }

        .note-card {
            break-inside: avoid; margin-bottom: 20px; background: #fff; 
            border-radius: var(--card-radius); overflow: hidden; border: 1px solid #f2f2f2;
            display: inline-block; width: 100%; cursor: pointer; transition: transform 0.3s;
        }
        .note-card:hover { transform: translateY(-5px); }
        .note-image { width: 100%; display: block; background: #f0f0f0; }
        .note-info { padding: 12px; }
        .note-title { font-size: 14px; font-weight: 600; line-height: 1.5; color: #111; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .note-footer { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--xhs-gray-text); }
        .author-box { display: flex; align-items: center; gap: 6px; }
        .author-img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }

        /* --- 詳情彈窗 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 1100px; height: 85vh;
            border-radius: 24px; display: flex; overflow: hidden; position: relative;
        }

        @media (max-width: 768px) {
            .modal-overlay { background: #fff; align-items: flex-start; }
            .modal-content { width: 100%; height: 100%; border-radius: 0; flex-direction: column; overflow-y: auto; }
            .modal-left { flex: none; width: 100%; height: auto; }
            .modal-right { flex: none; width: 100%; padding: 20px; padding-bottom: 100px; border-left: none; }
            .close-btn { 
                top: 15px !important; left: 15px; right: auto !important; 
                background: rgba(0,0,0,0.5); color: #fff !important; 
                width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            }
        }

        .modal-left { flex: 1.4; background: #000; display: flex; align-items: center; justify-content: center; }
        #modalSingleImage { max-width: 100%; max-height: 100%; object-fit: contain; }
        .modal-right { flex: 1; padding: 30px; display: flex; flex-direction: column; overflow-y: auto; border-left: 1px solid #eee; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #999; z-index: 1100; }
        .modal-author { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .modal-author img { width: 40px; height: 40px; border-radius: 50%; }
        .modal-body { font-size: 16px; line-height: 1.8; color: #333; white-space: pre-line; margin-bottom: 20px; }
        .modal-footer-actions { margin-top: auto; display: flex; justify-content: space-between; padding: 20px 0; border-top: 1px solid #eee; background: #fff; }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="logo-box">小</div>
        <div class="nav-item">🏠<br>首頁</div>

                    <div>💬 <span id="commentText"></span></div>

                </div>
            </div>
        </div>
    </div>

            { id: 2, title: "🎢環球影城一日遊！保姆級攻略+拍照機位📷", author: "魔法少女小張", avatar: "https://randomuser.me/api/portraits/women/2.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/BeIjing%202_1.jpg", body: "北京環球影城真的太好拍了！\n哈利波特園區一定要穿魔法袍，拍照超有氛圍感🧙‍♂️\n建議早上8:30就到，先衝哈利波特禁忌之旅，排隊最少！\n\n#北京環球影城 #環球影城攻略 #北京拍照", likes: "18,500", collects: "6,800", comments: "620", shares: "2,300" },
            { id: 3, title: "👣北京週末這樣玩！本地人推薦的一日遊路線📍", author: "胡同裡的小王", avatar: "https://randomuser.me/api/portraits/men/3.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Beijing%203_1.png", body: "週末來北京，推薦這條本地人私藏路線👇\n上午先去天安門廣場看升旗，超震撼！\n然後步行到前門大街，吃一碗老北京豆汁兒配焦圈🥣\n\n#北京週末 #北京本地人推薦 #天安門", likes: "9,600", collects: "2,100", comments: "380", shares: "950" },
            { id: 4, title: "🌷北京春天賞花必去！頤和園+西堤桃花美哭了💕", author: "園林小公主", avatar: "https://randomuser.me/api/portraits/women/4.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Beijing%204_1.jpg", body: "春天的頤和園真的太美了！\n西堤的桃花開得正盛，湖邊拍照超有氛圍感🌸\n\n#北京春天 #頤和園 #賞花 #北京拍照", likes: "15,200", collects: "4,500", comments: "520", shares: "1,800" },
            { id: 5, title: "☕️北京胡同漫遊指南！5家寶藏小店+拍照機位📷", author: "文藝拾光人", avatar: "https://randomuser.me/api/portraits/women/5.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Beijing%205_1.jpg", body: "週末不想去景點人擠人，就來胡同裡慢慢逛吧～\n推薦五道營胡同，每家小店都超有格調✨\n\n#北京胡同 #北京探店 #小眾咖啡", likes: "11,500", collects: "3,500", comments: "420", shares: "980" },

            { id: 9, title: "🌺武漢春天賞花天花板！東湖櫻園美到失語💕", author: "賞花攝影師", avatar: "https://randomuser.me/api/portraits/women/9.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Wuhan%204_1.png", body: "東湖櫻園的春天，真的美哭了！\n上萬株櫻花同時綻放，像走進了粉色的雲海🌸\n\n#武漢春天 #東湖櫻園 #賞花", likes: "17,500", collects: "6,200", comments: "650", shares: "2,400" },
            { id: 10, title: "☕️武漢小眾咖啡地圖！5家藏在老社區的寶藏店📷", author: "江城探店喵", avatar: "https://randomuser.me/api/portraits/women/10.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Wuhan%205_1.png", body: "藏在老社區裡的咖啡館，才是真正的寶藏✨\n黎黃陂路上的百年老洋房，復古感拉滿🏛️\n\n#武漢探店 #小眾咖啡 #黎黃陂路", likes: "11,600", collects: "2,700", comments: "340", shares: "950" },
            { id: 11, title: "🍵成都春天這樣過！人民公園喝茶+鶴鳴茶社攻略🌿", author: "蓉城小茶友", avatar: "https://randomuser.me/api/portraits/women/11.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Chengdu%201_1.JPG", body: "春天來成都，一定要去人民公園喝茶！\n鶴鳴茶社百年老字號，找個竹椅坐下，點杯蓋碗茶🍵\n\n#成都旅遊 #人民公園 #蓋碗茶", likes: "14,200", collects: "3,600", comments: "480", shares: "1,400" },
            { id: 12, title: "🐼成都週末必去！大熊猫基地+都江堰一日遊攻略📍", author: "滾滾守護者", avatar: "https://randomuser.me/api/portraits/women/12.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Chengdu%202_1.jpeg", body: "來成都，怎麼能不看大熊猫！\n建議早上8點前到大熊猫基地，熊猫最活躍🐼\n\n#成都週末 #大熊猫 #都江堰", likes: "19,800", collects: "7,200", comments: "780", shares: "2,800" },
            { id: 13, title: "🔥成都火鍋地圖！本地人私藏的5家寶藏火鍋店🌶️", author: "火鍋星人", avatar: "https://randomuser.me/api/portraits/men/13.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Chengdu%203_1.JPG", body: "來成都，火鍋是必須要吃的！\n藏在巷子裡的老火鍋，牛油鍋底香到上頭🔥\n\n#成都火鍋 #成都美食 #本地人推薦", likes: "21,500", collects: "8,600", comments: "920", shares: "3,200" },
            { id: 14, title: "📸成都拍照聖地！5個超出片的小眾打卡點✨", author: "視覺成都", avatar: "https://randomuser.me/api/portraits/women/14.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Chengdu%204_1.JPG", body: "東郊記憶，工業風+塗鴉牆，隨手拍都是大片🏭\n玉林路的小酒館，文藝氛圍拉滿🍷\n\n#成都拍照 #小眾打卡地 #東郊記憶", likes: "15,800", collects: "4,900", comments: "530", shares: "1,900" },
            { id: 15, title: "🌼成都春天必去！油菜花海+周邊遊一日遊攻略💛", author: "賞花愛好者", avatar: "https://randomuser.me/api/portraits/women/15.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Chengdu%205_1.JPG", body: "成都的春天，是油菜花給的！\n金黃的油菜花一望無際，拍照超治癒📸\n\n#成都春天 #油菜花 #周邊遊", likes: "13,900", collects: "3,800", comments: "460", shares: "1,500" },
            { id: 16, title: "🛶漓江竹筏與陽朔山水｜桂林三日安排🌄", author: "山水旅人", avatar: "https://randomuser.me/api/portraits/men/16.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Guilin%201_1.JPG", body: "推薦從楊堤到興坪這一段，二十元人民幣背景都在這裡🛶\n\n#桂林 #漓江 #陽朔 #廣西旅遊", likes: "8,200", collects: "2,100", comments: "390", shares: "860" },
            { id: 17, title: "🥧澳門一日｜大三巴與葡式蛋撻", author: "美食挖掘機", avatar: "https://randomuser.me/api/portraits/women/17.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Macau%201_1.JPG", body: "來澳門，大三巴是一定要去的。安德魯蛋撻值得等🥧\n\n#澳門 #大三巴 #葡式蛋撻 #澳門美食", likes: "6,500", collects: "1,500", comments: "280", shares: "620" },
            { id: 18, title: "🌿伊犁的春天，是杏花與草原", author: "自駕阿強", avatar: "https://randomuser.me/api/portraits/men/18.jpg", image: "https://raw.githubusercontent.com/318-WC/Social-Media-research/refs/heads/main/Xinjiang%201_1.JPG", body: "四月的伊犁，杏花開了，草原也綠了。自駕最爽！🏔️\n\n#新疆 #伊犁 #賽里木湖 #新疆旅行", likes: "10,200", collects: "3,100", comments: "540", shares: "1,300" }
        ];

        const grid = document.getElementById('grid');

        // 隨機洗牌算法 (Fisher-Yates)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render(data) {
            grid.innerHTML = '';
            data.forEach(post => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.innerHTML = `
                    <img class="note-image" src="${post.image}" loading="lazy">
                    <div class="note-info">
                        <div class="note-title">${post.title}</div>
                        <div class="note-footer">
                            <div class="author-box"><img class="author-img" src="${post.avatar}"><span>${post.author}</span></div>
                            <div>❤️ ${post.likes}</div>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(post);
                grid.appendChild(card);
            });
        }

        const modal = document.getElementById('modal');
        function openModal(post) {
            document.getElementById('modalSingleImage').src = post.image;
            document.getElementById('modalAvatar').src = post.avatar;
            document.getElementById('modalAuthorName').innerText = post.author;
            document.getElementById('modalTitle').innerText = post.title;
            document.getElementById('modalBody').innerText = post.body;
            document.getElementById('likeText').innerText = post.likes;
            document.getElementById('collectText').innerText = post.collects;
            document.getElementById('commentText').innerText = post.comments;
            document.getElementById('shareText').innerText = post.shares;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('closeModal').onclick = () => {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = posts.filter(p => p.title.toLowerCase().includes(val) || p.body.toLowerCase().includes(val));
            render(filtered); // 搜尋時保持過濾後的結果
        };

        // 初始載入：洗牌後渲染
        render(shuffle([...posts]));
    </script>
</body>
</html>
